# <https://github.com/DavidAnson/markdownlint-cli2>
# MD013 sub-options limit noise where hard wrapping hurts readability (tables, headings,
# fenced code) without turning the rule off for body text.
config:
  default: true
  MD004:
    style: dash
  MD013:
    code_blocks: false
    headings: false
    line_length: 100
    tables: false
  MD025:
    front_matter_title: ""
  MD033: false
  MD041:
    # Allows a leading <div align="center"> line before the real # heading,
    # used for the centered badge-header block at the top of README.md.
    allow_preamble: true
  MD060:
    style: aligned
