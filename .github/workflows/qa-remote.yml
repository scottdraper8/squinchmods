name: Remote QA
run-name: qa-${{ inputs.run_id }}

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID generated by the local dispatcher"
        required: true
        type: string
      mod:
        description: "Mod slug or id"
        required: true
        type: string
      target:
        description: "Optional target id"
        required: false
        type: string
      profile:
        description: "Optional profile name"
        required: false
        type: string

permissions:
  contents: read

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - name: Rewrite SSH GitHub URLs
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Validate run id
        shell: bash
        env:
          RUN_ID: ${{ inputs.run_id }}
        run: |
          set -euo pipefail
          if [[ "$RUN_ID" =~ ^[0-9]+-[0-9a-f]{8}$ ]]; then
            echo "RUN_ID_VALID=true" >> "$GITHUB_ENV"
          else
            echo "RUN_ID_VALID=false" >> "$GITHUB_ENV"
            echo "QA_EXIT=2" >> "$GITHUB_ENV"
          fi

      - name: Initialize QA artifact
        if: env.RUN_ID_VALID == 'true'
        shell: bash
        env:
          RUN_ID: ${{ inputs.run_id }}
        run: |
          set -euo pipefail
          run_dir="games/minecraft/qa/runs/$RUN_ID"
          mkdir -p "$run_dir"
          cat > "$run_dir/result.json" <<JSON
          {"run_id":"$RUN_ID","status":"fail","exit_code":1,"counts":{},"duration_s":0.0}
          JSON
          cat > "$run_dir/qa-manifest.json" <<JSON
          {"schema":1,"run_id":"$RUN_ID","profile":"unknown","mod_id":"${{ inputs.mod }}","plan_sha256":null,"repo_commit":"$GITHUB_SHA","mod_commit":null,"jobs":[]}
          JSON
          echo "QA_EXIT=1" >> "$GITHUB_ENV"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21.0.11+10.0.LTS"

      - name: Mirror SDKMAN Java layout
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.sdkman/candidates/java"
          ln -sfn "$JAVA_HOME" "$HOME/.sdkman/candidates/java/21.0.11-tem"
          echo "SDKMAN_DIR=$HOME/.sdkman" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install QA tooling
        run: python -m pip install -e games/minecraft/tooling/qa

      - name: Run QA
        if: env.RUN_ID_VALID == 'true'
        shell: bash
        env:
          RUN_ID: ${{ inputs.run_id }}
          MOD: ${{ inputs.mod }}
          TARGET: ${{ inputs.target }}
          PROFILE: ${{ inputs.profile }}
        run: |
          set +e
          args=(
            python -m squinch_qa run "$MOD"
            --run-id "$RUN_ID"
            --repo-root "$GITHUB_WORKSPACE"
          )
          if [ -n "$TARGET" ]; then
            args+=(--target "$TARGET")
          fi
          if [ -n "$PROFILE" ]; then
            args+=(--profile "$PROFILE")
          fi
          "${args[@]}"
          qa_exit=$?
          echo "QA_EXIT=$qa_exit" >> "$GITHUB_ENV"
          exit 0

      - name: Upload QA artifact
        uses: Wandalen/wretry.action@v3.8.0
        if: always() && env.RUN_ID_VALID == 'true'
        with:
          action: actions/upload-artifact@v6
          attempt_limit: 3
          attempt_delay: 15000
          with: |
            name: qa-${{ inputs.run_id }}
            path: games/minecraft/qa/runs/${{ inputs.run_id }}/
            include-hidden-files: true
            if-no-files-found: error
            retention-days: 14

      - name: Preserve QA exit code
        if: always()
        shell: bash
        run: exit "${QA_EXIT:-1}"
