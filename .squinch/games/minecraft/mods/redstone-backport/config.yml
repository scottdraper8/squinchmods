schema: 1

mod:
  id: redstone-backport
  display_name: Redstone Backport

targets:
  - id: forge-1.20.1
    minecraft: "1.20.1"
    loader: forge
    loader_version: "47.4.0"
    java: 17
    supported: true
    capabilities: [server, worldgen, command-script, gametest]

  - id: fabric-1.20.1
    minecraft: "1.20.1"
    loader: fabric
    loader_version: "0.15.11"
    java: 17
    supported: true
    capabilities: [server, worldgen, command-script]

  - id: quilt-1.20.1
    minecraft: "1.20.1"
    loader: quilt
    loader_version: "0.26.0"
    java: 17
    supported: true
    capabilities: [server, worldgen, command-script]

profiles:
  pre-pr:
    add: [tick-freeze, crafter-basic]

tests:
  pregen:
    config:
      tool_preference: [chunky]

  tick-freeze:
    requires: [server, command-script]
    adapters:
      forge:
        type: command-script
      fabric:
        type: command-script
      quilt:
        type: command-script
    config:
      timeout_s: 300
      commands:
        - gamerule sendCommandFeedback true
        - tick freeze
        - tick query
        - tick step 1
        - tick unfreeze
        - tick query
      expect_output:
        - The game is frozen
        - Stepping 1 tick
        - The game runs normally

  crafter-basic:
    requires: [server, command-script]
    adapters:
      forge:
        type: command-script
      fabric:
        type: command-script
      quilt:
        type: command-script
    config:
      timeout_s: 300
      commands:
        - gamerule sendCommandFeedback true
        - setblock 0 64 0 air
        - setblock 0 64 0 redstone_backport:crafter
        - data get block 0 64 0 id
      expect_output:
        - Changed the block at 0, 64, 0
        - redstone_backport:crafter
